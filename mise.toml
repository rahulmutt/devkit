# Root toolchain for devkit. Pin exact versions with `mise use --pin`.
[tools]
deno = "2.1.4"     # pinned via `mise use --pin deno`
node = "22.11.0"   # pinned via `mise use --pin node@22`

# Tasks delegate to `deno task <name>` so the actual commands live in EXACTLY
# one place (deno.json). Don't inline the deno commands here — that would
# re-introduce hand-maintained duplication outside the drift guard.
[tasks.generate]
description = "Render all per-harness manifests from marketplace.config.ts"
run = "deno task generate"

[tasks.check]
description = "Verify generated files are in sync (no writes)"
run = "deno task check"

[tasks.test]
description = "Run the generator test suite"
run = "deno task test"

[tasks.rasterize]
description = "Rasterize assets/devkit.svg -> assets/app-icon.png (run when the SVG changes)"
run = "deno task rasterize"
